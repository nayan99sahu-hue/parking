<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ParkiPro — Parchi Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0fdf4; }
      :root {
        --teal-50: #f0fdfa; --teal-100: #ccfbf1; --teal-200: #99f6e4;
        --teal-400: #2dd4bf; --teal-500: #14b8a6; --teal-600: #0d9488;
        --teal-700: #0f766e; --teal-800: #115e59; --teal-900: #134e4a;
        --green-400: #4ade80; --green-500: #22c55e; --green-600: #16a34a;
        --sidebar-w: 260px;
      }
      @media print {
        .no-print { display: none !important; }
        .print-only { display: block !important; }
      }
      .print-only { display: none; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
